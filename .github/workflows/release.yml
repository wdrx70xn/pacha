name: Release
'on':
  push:
    tags:
    - v*
permissions:
  contents: write
  id-token: write
concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false
jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      crate_name: ${{ steps.parse.outputs.crate_name }}
      has_binaries: ${{ steps.bincheck.outputs.has_binaries }}
    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Parse tag and verify version
      id: parse
      run: "TAG=\"${GITHUB_REF_NAME}\"\n\n# Parse tag format: v1.0.0 or v-cratename-1.0.0\n\
        if [[ \"$TAG\" =~ ^v-([a-z][a-z0-9_-]*)-([0-9]+\\..+)$ ]]; then\n  CRATE_NAME=\"\
        ${BASH_REMATCH[1]}\"\n  TAG_VER=\"${BASH_REMATCH[2]}\"\n  echo \"Workspace\
        \ release: crate=$CRATE_NAME version=$TAG_VER\"\nelif [[ \"$TAG\" =~ ^v([0-9]+\\\
        ..+)$ ]]; then\n  CRATE_NAME=\"\"\n  TAG_VER=\"${BASH_REMATCH[1]}\"\n  echo\
        \ \"Single-crate release: version=$TAG_VER\"\nelse\n  echo \"::error::Tag\
        \ '$TAG' does not match expected format (v1.0.0 or v-crate-1.0.0)\"\n  exit\
        \ 1\nfi\n\n# Use cargo metadata for reliable version extraction\nif [ -n \"\
        $CRATE_NAME\" ]; then\n  CARGO_VER=$(cargo metadata --format-version 1 --no-deps\
        \ \\\n    | jq -r \".packages[] | select(.name == \\\"$CRATE_NAME\\\") | .version\"\
        )\n  if [ -z \"$CARGO_VER\" ] || [ \"$CARGO_VER\" = \"null\" ]; then\n   \
        \ echo \"::error::Crate '$CRATE_NAME' not found in workspace\"\n    exit 1\n\
        \  fi\nelse\n  CARGO_VER=$(cargo metadata --format-version 1 --no-deps \\\n\
        \    | jq -r '.packages[0].version')\nfi\n\nif [ \"$TAG_VER\" != \"$CARGO_VER\"\
        \ ]; then\n  echo \"::error::Tag version $TAG_VER != Cargo.toml version $CARGO_VER\"\
        \n  exit 1\nfi\n\necho \"crate_name=$CRATE_NAME\" >> \"$GITHUB_OUTPUT\"\n\
        echo \"version=$TAG_VER\" >> \"$GITHUB_OUTPUT\"\necho \"Version verified:\
        \ $TAG_VER\"\n"
    - name: Detect binary targets
      id: bincheck
      run: "HAS_BINS=$(cargo metadata --format-version 1 --no-deps \\\n  | jq '[.packages[].targets[]\
        \ | select(.kind[] == \"bin\")] | length')\necho \"has_binaries=$( [ \"$HAS_BINS\"\
        \ -gt 0 ] && echo true || echo false )\" >> \"$GITHUB_OUTPUT\"\necho \"Binary\
        \ targets found: $HAS_BINS\"\n"
    - name: Create draft GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: "gh release create \"$GITHUB_REF_NAME\" \\\n  --draft \\\n  --verify-tag\
        \ \\\n  --title \"$GITHUB_REF_NAME\" \\\n  --generate-notes\n"
  gate:
    needs: create-release
    uses: paiml/.github/.github/workflows/unified-gate.yml@main
    with:
      repo: ${{ github.event.repository.name }}
      pr_sha: ${{ github.sha }}
    secrets: inherit
  verify:
    needs:
    - create-release
    - gate
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Verify package tarball
      run: "CRATE=\"${{ needs.create-release.outputs.crate_name }}\"\nif [ -n \"$CRATE\"\
        \ ]; then\n  cargo package --verify -p \"$CRATE\"\nelse\n  cargo package --verify\n\
        fi\n"
  publish:
    needs:
    - create-release
    - verify
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Authenticate to crates.io (OIDC)
      uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec
    - name: Publish
      run: "CRATE=\"${{ needs.create-release.outputs.crate_name }}\"\nif [ -n \"$CRATE\"\
        \ ]; then\n  cargo publish -p \"$CRATE\"\nelse\n  cargo publish\nfi\n"
  build-binaries:
    needs:
    - create-release
    - publish
    if: needs.create-release.outputs.has_binaries == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
        - x86_64-unknown-linux-gnu
        - x86_64-unknown-linux-musl
        - aarch64-unknown-linux-gnu
        - aarch64-unknown-linux-musl
    env:
      CARGO: cargo
      CROSS_VERSION: v0.2.5
    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Install target prerequisites
      run: "case \"${{ matrix.target }}\" in\n  x86_64-*-musl)\n    sudo apt-get update\
        \ -qq\n    sudo apt-get install -y -qq musl-tools >/dev/null\n    rustup target\
        \ add \"${{ matrix.target }}\"\n    ;;\n  aarch64-*)\n    # Use pinned cross\
        \ binary for ARM targets (no cargo install \u2014 too slow)\n    dir=\"$RUNNER_TEMP/cross-download\"\
        \n    mkdir -p \"$dir\"\n    echo \"$dir\" >> \"$GITHUB_PATH\"\n    curl -sL\
        \ \"https://github.com/cross-rs/cross/releases/download/$CROSS_VERSION/cross-x86_64-unknown-linux-musl.tar.gz\"\
        \ \\\n      | tar xz -C \"$dir\"\n    echo \"CARGO=cross\" >> \"$GITHUB_ENV\"\
        \n    ;;\nesac\n"
    - name: Discover binary names and features
      id: bins
      run: "BINS=$(cargo metadata --format-version 1 --no-deps \\\n  | jq -r '[.packages[].targets[]\
        \ | select(.kind[] == \"bin\") | .name] | join(\" \")')\necho \"names=$BINS\"\
        \ >> \"$GITHUB_OUTPUT\"\necho \"Binaries to build: $BINS\"\n\n# Detect features\
        \ needed for binary builds:\n# 1. .release.toml (explicit override) takes\
        \ precedence\n# 2. Otherwise, auto-detect required-features from bin targets\n\
        if [ -f .release.toml ] && grep -q 'features' .release.toml; then\n  FEATURES=$(grep\
        \ '^features' .release.toml | sed 's/.*\\[//;s/\\].*//;s/\"//g;s/ //g')\n\
        else\n  FEATURES=$(cargo metadata --format-version 1 --no-deps \\\n    | jq\
        \ -r '[.packages[].targets[] | select(.kind[] == \"bin\") | (.\"required-features\"\
        \ // [])[] ] | unique | join(\",\")')\nfi\nif [ -n \"$FEATURES\" ]; then\n\
        \  echo \"feature_flags=--features $FEATURES\" >> \"$GITHUB_OUTPUT\"\n  echo\
        \ \"Build features: $FEATURES\"\nelse\n  echo \"feature_flags=\" >> \"$GITHUB_OUTPUT\"\
        \n  echo \"Build features: (default)\"\nfi\n"
    - name: Build release binaries (release-lto profile)
      run: '$CARGO build --profile release-lto --target "${{ matrix.target }}" ${{
        steps.bins.outputs.feature_flags }}

        '
    - name: Strip binaries
      run: "TARGET=\"${{ matrix.target }}\"\nfor BIN in ${{ steps.bins.outputs.names\
        \ }}; do\n  BIN_PATH=\"target/${TARGET}/release-lto/$BIN\"\n  case \"$TARGET\"\
        \ in\n    aarch64-*)\n      # Strip via cross Docker image with target-appropriate\
        \ strip tool\n      docker run --rm -v \"$PWD/target:/target:Z\" \\\n    \
        \    \"ghcr.io/cross-rs/${TARGET}:main\" \\\n        aarch64-linux-gnu-strip\
        \ \"/$BIN_PATH\"\n      ;;\n    *)\n      strip \"$BIN_PATH\"\n      ;;\n\
        \  esac\ndone\n"
    - name: Package archives
      run: "VERSION=\"${{ needs.create-release.outputs.version }}\"\nTARGET=\"${{\
        \ matrix.target }}\"\n\nfor BIN in ${{ steps.bins.outputs.names }}; do\n \
        \ ARCHIVE=\"${BIN}-${VERSION}-${TARGET}\"\n  mkdir -p \"$ARCHIVE\"\n\n  cp\
        \ \"target/${TARGET}/release-lto/$BIN\" \"$ARCHIVE/\"\n\n  # Include license\
        \ and readme if present\n  for f in README.md LICENSE LICENSE-MIT COPYING\
        \ UNLICENSE; do\n    [ -f \"$f\" ] && cp \"$f\" \"$ARCHIVE/\"\n  done\n\n\
        \  # tar.gz archive + per-archive sha256 (ripgrep pattern)\n  tar czf \"${ARCHIVE}.tar.gz\"\
        \ \"$ARCHIVE\"\n  shasum -a 256 \"${ARCHIVE}.tar.gz\" > \"${ARCHIVE}.tar.gz.sha256\"\
        \n  echo \"Packaged: ${ARCHIVE}.tar.gz ($(du -h \"${ARCHIVE}.tar.gz\" | cut\
        \ -f1))\"\ndone\n"
    - name: Upload to GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: "gh release upload \"$GITHUB_REF_NAME\" \\\n  *.tar.gz *.sha256 \\\n  --clobber\n"
  publish-release:
    needs:
    - create-release
    - publish
    - build-binaries
    if: always() && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
    - name: Publish GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: 'gh release edit "$GITHUB_REF_NAME" --draft=false

        '
    - name: Write summary
      if: always()
      run: "VERSION=\"${{ needs.create-release.outputs.version }}\"\necho \"### Release\
        \ $GITHUB_REF_NAME\" >> \"$GITHUB_STEP_SUMMARY\"\necho \"\" >> \"$GITHUB_STEP_SUMMARY\"\
        \necho \"- crates.io: **published** ($VERSION)\" >> \"$GITHUB_STEP_SUMMARY\"\
        \nif [ \"${{ needs.build-binaries.result }}\" = \"success\" ]; then\n  echo\
        \ \"- Binaries: **4/4 targets uploaded**\" >> \"$GITHUB_STEP_SUMMARY\"\nelif\
        \ [ \"${{ needs.build-binaries.result }}\" = \"skipped\" ]; then\n  echo \"\
        - Binaries: skipped (library-only crate)\" >> \"$GITHUB_STEP_SUMMARY\"\nelse\n\
        \  echo \"- Binaries: **partial** (some targets failed, best-effort)\" >>\
        \ \"$GITHUB_STEP_SUMMARY\"\nfi\necho \"- GitHub Release: **published**\" >>\
        \ \"$GITHUB_STEP_SUMMARY\"\n"
